<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says Game</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js" defer></script>
</head>

<body>

    <h3>Highest Score</h3>
    <p id="high-score">0</p>

    <h1>Simon Says</h1>

    <h2 id="message">Press Start to Play</h2>

    <main class="game-container"></main>

    <section class="game-board">
        <button class="color-btn" id="red"></button>
        <button class="color-btn" id="blue"></button>
        <button class="color-btn" id="green"></button>
        <button class="color-btn" id="yellow"></button>
    </section>

    <button id="start-btn">Start Game</button>
    <button id="restart-btn">Restart Game</button>

    <!-- Game Over Popup -->
    <div id="game-over-modal">
        <div class="modal-content">
            <h2>Game Over</h2>

            <p>
                You reached
                <span id="level-reached">0</span>
            </p>

            <button id="play-again-btn">Return to Start</button>
        </div>
    </div>

</body>

</html>
