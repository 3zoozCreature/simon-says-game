<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says Game</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js" defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap');
    </style>
</head>

<body>

    <h3>Highest Score</h3>
    <p id="high-score">0</p>

    <h1>Simon Says</h1>

    <h2 id="message">Press Start to Play</h2>

    <main class="game-container"></main>

    <section class="game-board">
        <button class="color-btn" id="red"></button>
        <button class="color-btn" id="blue"></button>
        <button class="color-btn" id="green"></button>
        <button class="color-btn" id="yellow"></button>
    </section>

    <button id="start-btn">Start Game</button>
    <button id="restart-btn">Restart Game</button>
    </main>

</body>

</html>
